<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WatchTower</title>
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="topbar-left">
                <h1>WatchTower</h1>
                <p>Monitoreo operativo de dispositivos IoT</p>
            </div>

            <div class="topbar-right">
                <div class="service-status">
                    <span class="service-label">Servicio</span>
                    <span id="serviceHealthBadge" class="health-badge loading">Cargando...</span>
                    <span id="lastRefreshText" class="last-refresh">-</span>
                </div>

                <button id="refreshButton" class="btn btn-primary" type="button">
                    Actualizar
                </button>
            </div>
        </header>

        <main class="layout layout-single">
            <section class="panel panel-main">
                <div class="panel-header">
                    <h2>Dispositivos</h2>

                    <div class="filters">
                        <label>
                            <span>Estado</span>
                            <select id="statusFilter">
                                <option value="">Todos</option>
                                <option value="Online">Online</option>
                                <option value="Degraded">Degraded</option>
                                <option value="Offline">Offline</option>
                                <option value="Delayed">Delayed</option>
                            </select>
                        </label>

                        <label>
                            <span>Empresa</span>
                            <select id="empresaFilter">
                                <option value="">Todas</option>
                            </select>
                        </label>

                        <label class="search-box">
                            <span>Buscar DeviceId</span>
                            <input id="searchBox" type="text" placeholder="Ej: 808A26A50528" />
                        </label>
                    </div>
                </div>

                <div class="panel-body panel-body-compact">
                    <div id="devicesMessage" class="message"></div>

                    <div class="table-wrap">
                        <table class="data-table data-table-dense data-table-devices">
                            <thead>
                                <tr>
                                    <th>DeviceId</th>
                                    <th>Empresa</th>
                                    <th>Estado</th>
                                    <th>Último heartbeat</th>
                                    <th>Uptime</th>
                                    <th>RSSI</th>
                                    <th>WS</th>
                                    <th>Cola</th>
                                    <th>FreeHeap</th>
                                    <th>Issues</th>
                                </tr>
                            </thead>
                            <tbody id="devicesTableBody">
                                <tr>
                                    <td colspan="10" class="empty-cell">Cargando dispositivos...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section class="panel">
                <div class="panel-header">
                    <h2>Histórico</h2>
                </div>
                <div class="panel-body panel-body-compact">
                    <div id="historyMessage" class="message"></div>

                    <div class="history-wrap">
                        <table class="data-table data-table-dense data-table-compact">
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Estado</th>
                                    <th>RSSI</th>
                                    <th>WS</th>
                                    <th>Cola</th>
                                    <th>FreeHeap</th>
                                </tr>
                            </thead>
                            <tbody id="historyTableBody">
                                <tr>
                                    <td colspan="6" class="empty-cell">Sin selección.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
